<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Our Space 💜</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#0f0b14;color:#fff}
header{padding:12px;background:#1b1324;border-bottom:1px solid #333}
.wrap{padding:16px;max-width:1000px;margin:auto}
.card{background:#1a1622;padding:16px;border-radius:14px;margin-bottom:12px}
input,button{padding:10px;border-radius:10px;border:none}
input{width:100%;margin:6px 0}
button{background:#a855f7;color:white;cursor:pointer}
video{width:100%;max-height:60vh;background:black;border-radius:12px}
#chat{height:180px;overflow:auto;background:#120f18;padding:8px;border-radius:10px;margin:10px 0}
.msg{margin:4px 0}
</style>
</head>
<body>
<header><h2>Our Space 💜</h2></header>
<div class="wrap">
<div class="card">
<button onclick="host()">Host 🎬</button>
<button onclick="join()">Join 🍿</button>
<p>Your ID: <span id="myid">...</span></p>
<input id="peerid" placeholder="Host ID">
</div>

<div class="card">
<input id="videoUrl" placeholder="Direct MP4 URL">
<button onclick="loadVideo()">Load Video</button>
<video id="video" controls playsinline></video>
</div>

<div class="card">
<div id="chat"></div>
<input id="msg" placeholder="message">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
let peer,conn,isHost=false;
const v=document.getElementById("video");

function host(){
isHost=true;
peer=new Peer();
peer.on('open',id=>document.getElementById('myid').textContent=id);
peer.on('connection',c=>{
conn=c;
setup();
});
}

function join(){
peer=new Peer();
peer.on('open',()=>{
conn=peer.connect(document.getElementById('peerid').value.trim());
setup();
});
}

function setup(){
conn.on('open',()=>add("💜 Connected"));
conn.on('data',d=>{
if(d.type==="chat") add("Them: "+d.text);
if(d.type==="load"){v.src=d.url;document.getElementById('videoUrl').value=d.url;}
if(d.type==="play"){ if(v.paused) v.play(); }
if(d.type==="pause"){ v.pause(); }
if(d.type==="seek"){ v.currentTime=d.time; }
if(d.type==="sync"){
if(Math.abs(v.currentTime-d.time)>1) v.currentTime=d.time;
}
});
}

function loadVideo(){
const url=document.getElementById('videoUrl').value;
v.src=url;
if(conn) conn.send({type:"load",url});
}

v.addEventListener('play',()=>{ if(conn) conn.send({type:'play'}); });
v.addEventListener('pause',()=>{ if(conn) conn.send({type:'pause'}); });
v.addEventListener('seeked',()=>{ if(conn) conn.send({type:'seek',time:v.currentTime}); });

setInterval(()=>{
if(conn && !v.paused){
conn.send({type:'sync',time:v.currentTime});
}
},3000);

function sendMsg(){
let t=document.getElementById('msg').value;
if(!t)return;
add("You: "+t);
if(conn) conn.send({type:'chat',text:t});
document.getElementById('msg').value='';
}

function add(t){
let d=document.createElement('div');
d.className='msg';
d.textContent=t;
document.getElementById('chat').appendChild(d);
}
</script>
</body>
</html>
